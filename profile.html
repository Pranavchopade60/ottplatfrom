<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Select Profile | CineVerse</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="profile.css">

</head>

<body>

    <div class="container">

        <h1>

            Who's Watching?

        </h1>

        <div class="profiles">

            <div class="profile-card" onclick="selectProfile('Pranav')">

                <img src="https://my-ott-website-pranav.s3.ap-south-1.amazonaws.com/IMG20250819163628.jpg">

                <h3>

                    Pranav

                </h3>

            </div>

            <div class="profile-card" onclick="selectProfile('Guest')">

                <img src="images/profile2.png">

                <h3>

                    Guest

                </h3>

            </div>

            <div class="profile-card add-profile">

                <div class="plus">

                    +

                </div>

                <h3>

                    Add Profile

                </h3>

            </div>

        </div>

    </div>

    <script src="profile.js"></script>

</body>

</html>
